{% extends "base.html" %}

{% block title %}Reset Email Sent — ShopProject{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4 text-center">
                <h2 class="card-title mb-3">Check Your Email</h2>
                <p class="text-muted mb-0">
                    If the email exists in our system, we have sent a password reset link.
                </p>
                <p class="mt-3 mb-0">
                    <a href="{% url 'accounts:login' %}">Back to login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
